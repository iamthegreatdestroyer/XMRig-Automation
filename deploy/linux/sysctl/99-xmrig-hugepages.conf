# RandomX (Monero) hugepages for XMRig.
# 2 MiB pages. RandomX fast-mode dataset = 2080 MiB (1040 pages) + one 2 MiB scratchpad
# page per mining thread + init-time cache headroom. 1200 pages = 2400 MiB covers 4 threads
# with headroom. Reserved at boot (reliable vs on-demand, which can fail on fragmentation).
# NOTE: this reserves ~2.34 GiB of RAM away from the rest of the box while allocated.
vm.nr_hugepages = 1200
